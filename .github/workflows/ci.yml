name: CI

# Runs on every push and PR so regressions surface before they reach master.
# Uses ubuntu-latest (cheap, fast) because the test project only exercises
# ProjectExplorer.Core / .Shell, which target plain net10.0 — no WinForms UI
# code is under test, so no Windows runner is needed here.
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore tests/ProjectExplorer.Tests/ProjectExplorer.Tests.csproj

      - name: Build
        run: dotnet build tests/ProjectExplorer.Tests/ProjectExplorer.Tests.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test tests/ProjectExplorer.Tests/ProjectExplorer.Tests.csproj --no-build --configuration Release
